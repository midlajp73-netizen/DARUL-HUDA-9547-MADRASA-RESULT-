<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <title>മദ്റസ ഫലം</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📘 മദ്റസ വാർഷിക ഫലം</h1>

    <table>
      <tr>
        <th>പേര്</th>
        <td id="name"></td>
      </tr>
      <tr>
        <th>ക്ലാസ്</th>
        <td id="class"></td>
      </tr>
      <tr>
        <th>റോൾ നമ്പർ</th>
        <td id="roll"></td>
      </tr>
      <tr>
        <th>വിഷയങ്ങൾ</th>
        <td id="subjects"></td>
      </tr>
      <tr>
        <th>മാർക്ക്</th>
        <td id="mark"></td>
      </tr>
      <tr>
        <th>ശതമാനം</th>
        <td id="percentage"></td>
      </tr>
      <tr>
        <th>റാങ്ക്</th>
        <td id="rank"></td>
      </tr>
      <tr>
        <th>ആകെ ഹാജർ</th>
        <td id="attendance"></td>
      </tr>
    </table>
  </div>

  <script src="data.js"></script>
</body>
</html>
