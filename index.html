<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <title>മദ്റസ ഫലം</title>

  <link rel="stylesheet" href="style.css">

  <!-- html2pdf -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">

  <h1>📘 മദ്റസ വാർഷിക ഫലം</h1>

  <!-- 🔍 SEARCH -->
  <div class="search-box">
    <input type="number" id="rollInput" placeholder="റോൾ നമ്പർ നൽകുക">
    <button type="button" onclick="searchResult()">Search</button>
  </div>

  <!-- 📄 RESULT BOX -->
  <div id="resultBox">

    <!-- PDF AREA -->
    <div id="resultSection" style="display:none;">

      <!-- HEADER -->
      <div class="header">
        <img src="logo.png" class="logo">

        <div class="header-text">
          <h2>ദാറുൽ ഹുദ മദ്റസ പൂനൂർ</h2>
          <p>DARUL HUDA MADRASA POONOOR</p>
          <small>FINAL EXAMINATION RESULT</small>
        </div>
      </div>

      <!-- STUDENT DETAILS -->
      <h2>STUDENT DETAILS</h2>
      <table>
        <tr><th>NAME</th><td id="name"></td></tr>
        <tr><th>CLASS</th><td id="class"></td></tr>
        <tr><th>ROLL NUMBER</th><td id="roll"></td></tr>
      </table>

      <!-- MARKS -->
      <h2>MARK OF SUBJECTS</h2>
      <table>
        <thead>
          <tr>
            <th>SUBJECT</th>
            <th>TOTAL MARK</th>
            <th>SCORED MARK</th>
          </tr>
        </thead>
        <tbody id="marksTable"></tbody>
      </table>

      <!-- RESULT -->
      <h2>RESULT</h2>
      <table>
        <tr><th>TOTAL MARK</th><td id="total"></td></tr>
        <tr><th>PERCENTAGE</th><td id="percentage"></td></tr>
        <tr><th>STATUS</th><td id="status"></td></tr>
        <tr><th>RANK</th><td id="rank"></td></tr>
        <tr><th>ATTENDANCE</th><td id="attendance"></td></tr>
      </table>

      <!-- DOWNLOAD BUTTON -->
      <div class="btns" id="pdfBtn" style="text-align:center; margin-top:20px;">
        <button onclick="downloadPDF()">📥 Download PDF</button>
      </div>

    </div>

  </div>

</div>

<!-- PDF SCRIPT -->
<script>
function downloadPDF() {
  const element = document.getElementById("resultSection");

  html2pdf().set({
    margin: 5,
    filename: 'Madrasa_Result.pdf',
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(element).save();
}
</script>

<!-- DATA + LOGIC -->
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
