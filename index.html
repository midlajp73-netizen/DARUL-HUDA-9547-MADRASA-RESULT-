<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <title>മദ്റസ ഫലം</title>
  <link rel="stylesheet" href="style.css">

  <!-- ✅ html2pdf (use this only) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="container">

  <h1>📘 മദ്റസ വാർഷിക ഫലം</h1>

  <!-- 🔍 Search box -->
  <div class="search-box">
    <input type="number" id="rollInput" placeholder="റോൾ നമ്പർ നൽകുക">
    <button onclick="searchResult()">Search</button>
  </div>

  <!-- 📄 RESULT BOX (IMPORTANT FOR PDF) -->
  <div id="resultBox">

    <!-- ✅ RESULT SECTION -->
    <div id="resultSection" style="display:none;">

      <!-- Header -->
      <div class="header">
        <img src="logo.png" class="logo">
        <div class="header-text">
          <h2>ദാറുൽ ഹുദ മദ്റസ</h2>
          <p>DARUL HUDA MADRASA</p>
          <small>EXAMINATION RESULT</small>
        </div>
      </div>

      <!-- Student Info -->
      <h2>വിദ്യാർത്ഥി വിവരങ്ങൾ</h2>
      <table>
        <tr><th>പേര്</th><td id="name"></td></tr>
        <tr><th>ക്ലാസ്</th><td id="class"></td></tr>
        <tr><th>റോൾ നമ്പർ</th><td id="roll"></td></tr>
      </table>

      <!-- Marks -->
      <h2>വിഷയ മാർക്ക്</h2>
      <table>
        <tr>
          <th>വിഷയം</th>
          <th>ആകെ</th>
          <th>ലഭിച്ചത്</th>
        </tr>
        <tbody id="marksTable"></tbody>
      </table>

      <!-- Result -->
      <h2>ഫലം</h2>
      <table>
        <tr><th>ആകെ മാർക്ക്</th><td id="total"></td></tr>
        <tr><th>ശതമാനം</th><td id="percentage"></td></tr>
        <tr><th>സ്റ്റാറ്റസ്</th><td id="status"></td></tr>
        <tr><th>റാങ്ക്</th><td id="rank"></td></tr>
        <tr><th>ഹാജർ</th><td id="attendance"></td></tr>
      </table>

    </div>

  </div> <!-- ✅ resultBox END -->

</div> <!-- container END -->

<!-- 🔘 Buttons (OUTSIDE resultBox) -->
<div class="btns" style="text-align:center; margin:20px;">
  <button onclick="downloadPDF()">📥 Download PDF</button>
</div>

<!-- ✅ PDF SCRIPT -->
<script>
function downloadPDF() {
  const element = document.getElementById("resultBox");
  const btns = document.querySelector(".btns");

  // 🔴 Hide button
  btns.style.display = "none";

  html2pdf().set({
    margin: 5,
    filename: 'Madrasa_Result.pdf',
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(element).save().then(() => {

    // 🟢 Show again
    btns.style.display = "block";

  });
}
</script>

<!-- Your Data + Script -->
<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
